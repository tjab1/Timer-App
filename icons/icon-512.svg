    <ellipse cx="347" cy="235" rx="27" ry="19"/>
    <circle cx="352" cy="232" r="11" fill="#1a1a2e"/>

    <!-- Brow line -->
    <path d="M315 219 Q347 203 379 219"/>

    <!-- Nose -->
    <path d="M387 280 Q405 267 413,288 Q405 309 387 299 Q373 288 387 280" fill="#1a1a2e"/>

    <!-- Mouth/muzzle lines -->
    <path d="M387 299 L387 325"/>
    <path d="M387 325 Q368 341 352 333"/>
    <path d="M387 325 Q405 341 421 333"/>

    <!-- Nose bridge -->
    <path d="M360 253 Q379 245 395 261"/>

    <!-- Cheek fur detail -->
    <path d="M413 253 Q440 245 453 267"/>
    <path d="M421 280 Q448 280 459 299"/>

    <!-- Under eye detail -->
    <path d="M320 253 Q341 261 360 253"/>
  </g>

  <!-- Ear -->
