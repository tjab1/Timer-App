    <polygon points="227,93 293,13 299,112"/>
    <polygon points="267,80 341,5 333,101"/>
    <polygon points="307,75 387,21 368,107"/>
    <polygon points="347,85 427,48 405,128"/>
    <polygon points="379,112 459,85 432,160"/>

    <!-- Right side mane -->
    <polygon points="413,147 480,120 453,200"/>
    <polygon points="440,192 501,181 475,253"/>
    <polygon points="453,240 512,245 480,307"/>
    <polygon points="448,293 507,315 469,368"/>
    <polygon points="432,347 493,387 448,421"/>
    <polygon points="405,400 467,459 413,467"/>

