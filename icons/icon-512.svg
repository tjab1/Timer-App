  <path d="M307 120 Q315 112 320 128" fill="none" stroke="#1a1a2e" stroke-width="4"/>

  <!-- Inner mane detail lines -->
  <g fill="none" stroke="#1a1a2e" stroke-width="3">
    <path d="M200 173 Q227 200 240 240"/>
    <path d="M213 213 Q240 235 253 267"/>
    <path d="M208 267 Q235 280 253 307"/>
    <path d="M219 320 Q245 325 267 360"/>
    <path d="M240 373 Q267 373 293 400"/>
