<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <!-- Background -->
  <rect width="192" height="192" fill="#e63946" rx="32"/>
  <rect x="96" y="0" width="96" height="192" fill="#f8f9fa"/>

  <!-- Mane spikes - sharp pointed style -->
  <g fill="#1a1a2e">
    <!-- Top mane spikes -->
    <polygon points="75,45 95,15 100,50"/>
    <polygon points="85,35 110,5 112,42"/>
    <polygon points="100,30 128,2 125,38"/>
    <polygon points="115,28 145,8 138,40"/>
    <polygon points="130,32 160,18 152,48"/>
    <polygon points="142,42 172,32 162,60"/>

    <!-- Right side mane -->
    <polygon points="155,55 180,45 170,75"/>
    <polygon points="165,72 188,68 178,95"/>
    <polygon points="170,90 192,92 180,115"/>
    <polygon points="168,110 190,118 176,138"/>
    <polygon points="162,130 185,145 168,158"/>
    <polygon points="152,150 175,172 155,175"/>

    <!-- Bottom mane -->
    <polygon points="140,165 155,190 130,178"/>
    <polygon points="120,172 130,195 108,182"/>
    <polygon points="100,175 105,192 88,180"/>
    <polygon points="82,170 80,188 68,172"/>

    <!-- Left side mane (showing on red) -->
    <polygon points="65,160 55,180 58,155"/>
    <polygon points="58,140 42,158 50,132"/>
    <polygon points="52,118 32,130 45,105"/>
    <polygon points="50,95 28,100 42,78"/>
    <polygon points="52,75 30,72 48,55"/>
    <polygon points="60,58 40,48 58,42"/>
  </g>

  <!-- Lion face base -->
  <ellipse cx="115" cy="100" rx="42" ry="52" fill="#f8f9fa"/>

  <!-- Face details in line art style -->
  <g fill="none" stroke="#1a1a2e" stroke-width="2" stroke-linecap="round">
    <!-- Eye -->
    <ellipse cx="130" cy="88" rx="10" ry="7"/>
    <circle cx="132" cy="87" r="4" fill="#1a1a2e"/>

    <!-- Brow line -->
    <path d="M118 82 Q130 76 142 82"/>

    <!-- Nose -->
    <path d="M145 105 Q152 100 155 108 Q152 116 145 112 Q140 108 145 105" fill="#1a1a2e"/>

    <!-- Mouth/muzzle lines -->
    <path d="M145 112 L145 122"/>
    <path d="M145 122 Q138 128 132 125"/>
    <path d="M145 122 Q152 128 158 125"/>

    <!-- Nose bridge -->
    <path d="M135 95 Q142 92 148 98"/>

    <!-- Cheek fur detail -->
    <path d="M155 95 Q165 92 170 100"/>
    <path d="M158 105 Q168 105 172 112"/>

    <!-- Under eye detail -->
    <path d="M120 95 Q128 98 135 95"/>
  </g>

  <!-- Ear -->
  <path d="M110 55 Q105 40 115 35 Q128 38 125 55 Q120 50 110 55" fill="#f8f9fa" stroke="#1a1a2e" stroke-width="2"/>
  <path d="M115 45 Q118 42 120 48" fill="none" stroke="#1a1a2e" stroke-width="1.5"/>

  <!-- Inner mane detail lines -->
  <g fill="none" stroke="#1a1a2e" stroke-width="1.2">
    <path d="M75 65 Q85 75 90 90"/>
    <path d="M80 80 Q90 88 95 100"/>
    <path d="M78 100 Q88 105 95 115"/>
    <path d="M82 120 Q92 122 100 135"/>
    <path d="M90 140 Q100 140 110 150"/>
  </g>
</svg>
